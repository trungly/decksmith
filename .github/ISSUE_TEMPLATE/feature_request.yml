name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe what you're trying to do and what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like?
      description: Describe the feature or change you have in mind.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Screenshots, examples, alternative ideas — whatever helps.
    validations:
      required: false
