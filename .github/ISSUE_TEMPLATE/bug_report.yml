name: Bug Report
description: Report something that is broken or not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please search existing issues before submitting to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps or a code snippet that reliably reproduces the issue.
      placeholder: |
        1. Create a `<Deck>` with `...`
        2. Navigate to slide `...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or screenshots if helpful.
    validations:
      required: true

  - type: input
    id: decksmith-version
    attributes:
      label: Decksmith Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: svelte-version
    attributes:
      label: Svelte Version
      placeholder: "e.g. 5.28.0"
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, Node.js version, OS, etc.
      placeholder: |
        - Browser: Chrome 123
        - Node.js: 20.11.0
        - OS: macOS 14
    validations:
      required: false
