name: Bug Report
description: Report something that is broken or not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! A quick description and repro steps are all you need.

  - type: textarea
    id: description
    attributes:
      label: What's broken?
      description: A quick description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: Minimal steps or a snippet that shows the problem.
      placeholder: |
        1. Create a `<Deck>` with `...`
        2. Navigate to slide `...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, Node.js version, OS — whatever seems relevant.
      placeholder: |
        - Browser: Chrome 123
        - Node.js: 20.11.0
        - OS: macOS 14
    validations:
      required: false
